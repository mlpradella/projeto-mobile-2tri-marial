<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avisos Escolares</title>
  <link rel="stylesheet" href="1styles.css">
</head>
<body>

  <div class="container">
    <header class="header">
      <h2>Avisos Escolares</h2>
      <!-- Botão de voltar -->
      <a href="index.html" class="btn-voltar">Voltar</a>
    </header>

    <section class="avisos-section">
      <h3 class="section-title">Avisos Importantes</h3>
      <div class="avisos-grid">
        <div class="aviso-card warning">
          <h4>Tarefas</h4>
          <p>Existem 5 tarefas pendentes para essa semana.</p>
        </div>
        <div class="aviso-card danger">
          <h4>Provas</h4>
          <p>Existem 2 provas para essa semana.</p>
        </div>
        <div class="aviso-card success">
          <h4>Aulas</h4>
          <p>Aula de Educação Física na quadra essa semana.</p>
        </div>
        <div class="aviso-card success">
          <h4>Aulas</h4>
          <p>Aula de Química no laboratório essa semana.</p>
        </div>
      </div>
    </section>
  </div>

</body>
</html>
