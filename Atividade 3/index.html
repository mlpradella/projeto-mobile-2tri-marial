<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Cadastro de usuário</h1>
    

    <div class="formulario">

        <h2>Usuário</h2>

    <form>
        <label for="Usuario">Nome</label>
        <input type="texto" id="nome" placeholder="Digite seu nome">

        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="Digite seu e-mail">


        <label for="senha">Senha</label>
        <input type="senha" id="senha" placeholder="Digite sua senha">

        <button type="submit">Cadastrar</button>
    </form>
    </div>

    <div class="formulariotarefa">

        <h2>Tarefas</h2>

    <form>
        <label for="Usuario">Título</label>
        <input type="texto" id="title" placeholder="Digite o título">

        <label for="description">E-mail</label>
        <input type="description" id="description" placeholder="Digite sua desdcrição">


        <label for="prioridade">Senha</label>
        <input type="prioridade" id="prioridade" placeholder="Digite sua prioridade">

        <button type="submit">Lançar tarefa</button>
    </form>
    </div>

    <div class="formularioreserva">

        <h2>Reserva de espaço</h2>

    <form>
        <label for="Usuario">Nome</label>
        <input type="texto" id="nome" placeholder="Digite seu nome">

        <label for="email">Turma</label>
        <input type="email" id="email" placeholder="Digite sua turma">


        <label for="senha">Horário</label>
        <input type="senha" id="senha" placeholder="Digite seu horário">

        <button type="submit">Adicionar reserva</button>
    </form>
    </div>

     <div class="formulariologin">

        <h2>Login</h2>

    <form>

        <label for="email">Login</label>
        <input type="email" id="email" placeholder="Digite seu e-mail">


        <label for="senha">Senha</label>
        <input type="senha" id="senha" placeholder="Digite sua senha">

        <button type="submit">Acessar</button>
    </form>
    </div>

     <div class="formulariocontato">

        <h2>Contato com a coordenação</h2>

    <form>
        <label for="Usuario">Assunto</label>
        <input type="texto" id="title" placeholder="Digite o assunto">

        <label for="description">Mensagem</label>
        <input type="description" id="description" placeholder="Digite sua mensagem">

        <button type="submit">Enviar</button>
    </form>
    </div>

</body>
</html>
