    <title>Cadastro</title>

<body>

    <h1>Título</h1>

    <div class="base">

    <!-- Caixa -->
    <div class="caixa">
        <h2>Algum título</h2>
        <p>Esta é uma caixa com borda, sombra e espaçamento interno.</p>

    <!-- Botão abaixo da caixa -->

        <a href="../Atividade 4/1index.html" class="botao2">

    <!-- Formulário -->
    <div class="formulario">

        <h2>Cadastro</h2>

        <form>

            <label for="nome">Nome</label>
            <input type="text" id="nome" placeholder="Nome do aluno">

            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="Seu email">

            <label for="turma">Turma</label>
            <select id="turma" name="turma">
                <option value="">Selecione uma turma</option>
                <option value="6">Turma 6</option>
                <option value="7">Turma 7</option>
                <option value="8">Turma 8</option>
            </select>

            <button class="cadastro" type="submit">Cadastrar</button>

        </form>

    </div>
